<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGV 调度系统-呼叫点管理</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="topbar">
        <h1>呼叫点管理</h1>
        <div></div>
    </header>

    <main>
        <div class="toolbar">
            <h2>呼叫点 (CallPoint) 列表</h2>
            <button class="secondary" id="refreshBtn">刷新</button>
            <button id="addBtn">新增呼叫点</button>
        </div>

        <table id="cpTable">
            <thead>
                <tr>
                    <th>#ID</th>
                    <th>code</th>
                    <th>名称</th>
                    <th>功能</th>
                    <th>托盘形态</th>
                    <th>支持业务</th>
                    <th>运行状态</th>
                    <th>优先级</th>
                    <th>启用</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <p class="muted" style="margin-top: 8px;" id="emptyHint"></p>
    </main>

    <!-- ===== 呼叫点 新增/编辑 ===== -->
    <div class="modal-mask hidden" id="cpModal">
        <form class="modal" id="cpForm">
            <h3 id="cpModalTitle">新增呼叫点</h3>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <label>UUID
                    <input type="text" id="cpUuid" required maxlength="64">
                </label>
                <label>code
                    <input type="text" id="cpCode" required maxlength="64" placeholder="CP-001">
                </label>
            </div>

            <label>名称
                <input type="text" id="cpName" maxlength="128">
            </label>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <label>功能方向
                    <select id="cpFunc">
                        <option value="1">Load 上料</option>
                        <option value="2">Unload 下料</option>
                        <option value="3" selected>Load &amp; Unload</option>
                    </select>
                </label>
                <label>托盘形态
                    <select id="cpBindMode">
                        <option value="1">母子托</option>
                        <option value="2" selected>母托</option>
                        <option value="3">子托</option>
                    </select>
                </label>
            </div>

            <label>支持的业务类型 (该呼叫点能下哪种任务)</label>
            <div class="bt-group" id="cpBtGroup">
                <!-- 内容由 JS 用 App.BUSINESS_TYPE 渲染,避免硬编码漂移 -->
            </div>

            <label style="margin-top: 12px;">绑定 (空) 托盘类型
                <span class="muted">(SEND 业务时前端只能在此列表里选)</span>
                <select id="cpPalletTypes" multiple size="4" style="margin-top:4px;"></select>
            </label>

            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; margin-top: 12px;">
                <label>坐标 X
                    <input type="number" step="any" id="cpX" value="0">
                </label>
                <label>坐标 Y
                    <input type="number" step="any" id="cpY" value="0">
                </label>
                <label>优先级
                    <input type="number" id="cpPriority" value="100">
                </label>
                <label>最大并发任务
                    <input type="number" id="cpMax" value="1" min="1">
                </label>
            </div>

            <div id="cpError" class="error"></div>
            <div class="modal-actions">
                <button type="button" class="ghost" data-close="cpModal">取消</button>
                <button type="submit">保存</button>
            </div>
        </form>
    </div>

    <!-- ===== 呼叫调度弹窗 (v2 — 仅业务关键字, 库位/托盘后端自动检索) ===== -->
    <div class="modal-mask hidden" id="dispatchModal">
        <form class="modal" id="dispatchForm">
            <h3 id="dispatchModalTitle">呼叫调度</h3>
            <p class="muted" id="dispatchModalSub" style="font-size:12px;margin-bottom:8px;"></p>

            <label>业务类型
                <select id="dpBusiness" required></select>
            </label>

            <p class="muted" id="dpHint" style="font-size:12px;margin:6px 0 0;"></p>

            <div class="dispatch-fields">
                <!-- 零件 - 业务 2/4 必填 -->
                <label id="dpPartLabel" style="display:none;">
                    <span>零件 *</span>
                    <select id="dpPart"></select>
                </label>

                <!-- 匹配的托盘类型 (业务4 只读展示,后端按 part→pallet 映射自动选) -->
                <p id="dpPartPalletMatch"
                   style="display:none;font-size:12px;margin:2px 0 6px;padding:6px 8px;background:#f4f6fb;border-radius:4px;"></p>

                <!-- 托盘类型 - 业务 1/3 必填, 仅显示 CP 已绑定的范围 -->
                <label id="dpPalletLabel" style="display:none;">
                    <span>托盘类型 *</span>
                    <select id="dpPallet"></select>
                </label>
            </div>

            <label style="margin-top:8px;">指定 AGV (留空则自动选 IDLE+电量足够)
                <select id="dpAgv">
                    <option value="">自动选择</option>
                </select>
            </label>

            <div id="dispatchError" class="error"></div>
            <div class="modal-actions">
                <button type="button" class="ghost" data-close="dispatchModal">取消</button>
                <button type="submit" id="dispatchSubmit">呼叫</button>
            </div>
        </form>
    </div>

    <!-- ===== AGV 点位子表 ===== -->
    <div class="modal-mask hidden" id="pointModal">
        <div class="modal" style="max-width: 720px;">
            <h3 id="pointModalTitle">AGV 点位</h3>
            <p class="muted" id="pointModalSub"></p>

            <table class="sub" id="pointTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>AGV</th>
                        <th>AP</th>
                        <th>pre</th>
                        <th>tp</th>
                        <th>height</th>
                        <th>lift</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>

            <form id="pointForm" style="margin-top: 12px;">
                <h4 style="font-size: 13px; color: #2a4a8a; margin-bottom: 8px;">新增 / 更新点位</h4>
                <div style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px;">
                    <label>AGV
                        <select id="pAgvId" required></select>
                    </label>
                    <label>AP (必填)
                        <input type="text" id="pAp" required maxlength="64">
                    </label>
                    <label>pre
                        <input type="text" id="pPre" maxlength="64">
                    </label>
                    <label>tp
                        <input type="text" id="pTp" maxlength="64">
                    </label>
                    <label>height_pre
                        <input type="text" id="pHeightPre" maxlength="64">
                    </label>
                    <label>height
                        <input type="number" step="any" id="pHeight" value="0">
                    </label>
                    <label>lift_height
                        <input type="number" step="any" id="pLift" value="-1">
                    </label>
                </div>
                <div id="pointError" class="error"></div>
                <div class="modal-actions">
                    <button type="button" class="ghost" data-close="pointModal">关闭</button>
                    <button type="submit">保存 / 覆盖</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        App.renderTopbar("呼叫点管理", "call-points.html");
        App.bindModalCloseButtons();
        const api = App.api;
        const role = App.user.role;

        let cachedCps = [];
        let cachedAgvs = [];
        let cachedPallets = null;   // CP 编辑弹窗 + 调度弹窗 共用
        let cachedParts = null;     // 调度弹窗用
        let cachedMappings = null;  // 零件↔托盘 映射 (业务4 展示匹配托盘用)
        let cachedWs = null;        // 调度弹窗(放空托) 校验时用,目前不直接渲染
        let editingCpUuid = null;
        let currentCpUuid = null;

        /* 业务类型 checkbox 列表用 App.BUSINESS_TYPE 动态渲染 */
        function renderBtCheckboxes() {
            const box = document.getElementById("cpBtGroup");
            box.innerHTML = Object.entries(App.BUSINESS_TYPE).map(([id, info]) =>
                `<label><input type="checkbox" name="bt" value="${id}"> ${id}. ${App.escapeHtml(info.long)}</label>`
            ).join("");
        }
        renderBtCheckboxes();

        async function ensurePalletCache() {
            if (cachedPallets === null) cachedPallets = await api("GET", "/api/v1/pallet-types");
            return cachedPallets;
        }

        function fillCpPalletSelect(selectedIds = []) {
            const sel = document.getElementById("cpPalletTypes");
            const items = cachedPallets || [];
            sel.innerHTML = items.map(p =>
                `<option value="${p.id}">${App.escapeHtml(p.name || p.code)}</option>`
            ).join("");
            Array.from(sel.options).forEach(o => {
                o.selected = selectedIds.includes(parseInt(o.value, 10));
            });
        }

        async function loadCps() {
            const tbody = document.querySelector("#cpTable tbody");
            tbody.innerHTML = `<tr><td colspan="10" class="muted">加载中...</td></tr>`;
            try {
                cachedCps = await api("GET", "/api/v1/call-points");
                if (cachedCps.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="10" class="muted">还没有呼叫点</td></tr>`;
                    return;
                }
                tbody.innerHTML = cachedCps.map(c => {
                    const status = App.cpStatus(c.run_status);
                    const btHtml = c.business_types.length
                        ? c.business_types.map(bt => {
                            const info = App.BUSINESS_TYPE[App.toIntKey(bt)];
                            const short = info ? info.short : bt;
                            const long = info ? info.long : "";
                            return `<span class="badge on" title="${App.escapeHtml(long)}" style="background:#e6f0ff;color:#2a4a8a;margin-right:4px;">${App.escapeHtml(short)}</span>`;
                        }).join("")
                        : '<span class="muted">-</span>';
                    return `
                    <tr>
                        <td>${c.id}</td>
                        <td>${App.escapeHtml(c.code)}</td>
                        <td>${App.escapeHtml(c.name || "-")}</td>
                        <td>${App.lookup(App.FUNC_MODE_NAME, c.func_mode)}</td>
                        <td>${App.lookup(App.PALLET_BIND_MODE_NAME, c.bind_pallet_mode)}</td>
                        <td>${btHtml}</td>
                        <td>
                            <span class="badge" style="background:${status.color};color:#fff;">${status.name}</span>
                            ${c.current_task_id ? `<span class="muted"> → task #${c.current_task_id}</span>` : ""}
                        </td>
                        <td>${c.priority}</td>
                        <td><span class="badge ${c.is_active ? "on" : "off"}">${c.is_active ? "启用" : "禁用"}</span></td>
                        <td class="actions">
                            <button data-act="dispatch" data-uuid="${c.uuid}" data-code="${App.escapeHtml(c.code)}"
                                class="${c.run_status === 0 && c.is_active ? '' : 'secondary'}"
                                ${(c.run_status === 0 && c.is_active && c.business_types.length) ? '' : 'disabled'}>
                                呼叫
                            </button>
                            ${role === "admin" ? `
                                <button data-act="edit"   data-uuid="${c.uuid}" class="secondary">编辑</button>
                                <button data-act="points" data-uuid="${c.uuid}" data-name="${App.escapeHtml(c.code)}" class="secondary">AGV点位 (${c.agv_points.length})</button>
                                <button data-act="toggle" data-uuid="${c.uuid}" data-active="${c.is_active}" class="${c.is_active ? 'secondary' : ''}">${c.is_active ? "停用" : "启用"}</button>
                                <button data-act="del"    data-uuid="${c.uuid}" class="danger">删除</button>
                            ` : `
                                <button data-act="points" data-uuid="${c.uuid}" data-name="${App.escapeHtml(c.code)}" class="secondary">查看点位</button>
                            `}
                        </td>
                    </tr>`;
                }).join("");
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="10" class="error">${e.message}</td></tr>`;
            }
        }

        document.getElementById("refreshBtn").onclick = loadCps;

        document.getElementById("addBtn").onclick = async () => {
            if (role !== "admin") return alert("只有 admin 能新增");
            await ensurePalletCache();
            editingCpUuid = null;
            document.getElementById("cpModalTitle").textContent = "新增呼叫点";
            document.getElementById("cpForm").reset();
            document.getElementById("cpUuid").value = App.shortUuid();
            document.getElementById("cpUuid").disabled = false;
            document.getElementById("cpCode").disabled = false;
            document.getElementById("cpFunc").value = "3";
            document.getElementById("cpBindMode").value = "2";
            document.querySelectorAll("#cpBtGroup input[name=bt]").forEach(cb => cb.checked = false);
            fillCpPalletSelect([]);
            document.getElementById("cpX").value = 0;
            document.getElementById("cpY").value = 0;
            document.getElementById("cpPriority").value = 100;
            document.getElementById("cpMax").value = 1;
            document.getElementById("cpError").textContent = "";
            App.showModal("cpModal");
        };

        document.querySelector("#cpTable").addEventListener("click", async e => {
            const btn = e.target.closest("button[data-act]");
            if (!btn) return;
            const uuid = btn.dataset.uuid;
            const act = btn.dataset.act;
            if (act === "edit") {
                const c = cachedCps.find(x => x.uuid === uuid);
                if (!c) return;
                await ensurePalletCache();
                editingCpUuid = uuid;
                document.getElementById("cpModalTitle").textContent = "编辑呼叫点 " + c.code;
                document.getElementById("cpUuid").value = c.uuid;
                document.getElementById("cpUuid").disabled = true;
                document.getElementById("cpCode").value = c.code;
                document.getElementById("cpCode").disabled = true;
                document.getElementById("cpName").value = c.name || "";
                document.getElementById("cpFunc").value = c.func_mode;
                document.getElementById("cpBindMode").value = c.bind_pallet_mode;
                document.querySelectorAll("#cpBtGroup input[name=bt]").forEach(cb => {
                    cb.checked = c.business_types.includes(parseInt(cb.value, 10));
                });
                fillCpPalletSelect(c.pallet_type_ids || []);
                document.getElementById("cpX").value = c.coordinate_x;
                document.getElementById("cpY").value = c.coordinate_y;
                document.getElementById("cpPriority").value = c.priority;
                document.getElementById("cpMax").value = c.max_concurrent_tasks;
                document.getElementById("cpError").textContent = "";
                App.showModal("cpModal");
            } else if (act === "del") {
                if (!confirm(`确认删除呼叫点 ${uuid}?`)) return;
                try { await api("DELETE", `/api/v1/call-points/${uuid}`); await loadCps(); }
                catch (err) { alert(err.message); }
            } else if (act === "toggle") {
                const next = btn.dataset.active !== "true";
                if (!confirm(`确认${next ? "启用" : "停用"}呼叫点 ${uuid}?${next ? "" : "\n停用后不能触发呼叫调度。"}`)) return;
                try { await api("POST", `/api/v1/call-points/${uuid}/toggle-active?active=${next}`); await loadCps(); }
                catch (err) { alert(err.message); }
            } else if (act === "points") {
                await openPoints(uuid, btn.dataset.name);
            } else if (act === "dispatch") {
                await openDispatch(uuid, btn.dataset.code);
            }
        });

        /* ===== 呼叫调度弹窗 (v2 — 后端按库存自动检索) ===== */

        // cachedParts / cachedPallets 已在文件顶部声明,这里只补 cachedAgvs 的拉取
        async function ensureDispatchLookups() {
            const tasks = [];
            if (cachedParts === null)  tasks.push(api("GET", "/api/v1/parts").then(d => cachedParts = d));
            if (cachedPallets === null) tasks.push(api("GET", "/api/v1/pallet-types").then(d => cachedPallets = d));
            if (cachedMappings === null) tasks.push(api("GET", "/api/v1/parts/mappings/list").then(d => cachedMappings = d));
            if (cachedAgvs.length === 0) tasks.push(api("GET", "/api/v1/agvs").then(d => cachedAgvs = d));
            await Promise.all(tasks);
        }

        function fillSelect(sel, items, valKey, labelFn, defaultOpt) {
            sel.innerHTML = "";
            if (defaultOpt) {
                const o = document.createElement("option");
                o.value = defaultOpt.value;
                o.textContent = defaultOpt.label;
                sel.appendChild(o);
            }
            items.forEach(it => {
                const o = document.createElement("option");
                o.value = it[valKey];
                o.textContent = labelFn(it);
                sel.appendChild(o);
            });
        }

        // 业务类型 → 该业务需要的字段 (part / pallet) 与提示文案。
        //   1 送空托到WS: 选托盘类型
        //   2 送料到CP:   选零件
        //   3 送空托到CP: 选托盘类型
        //   4 送料到WS:   选零件(后端按 零件→托盘 映射自动匹配)
        const BIZ_RULES = {
            1: { need: "pallet", hint: "前端只选要送的空托盘类型,后端自动找 EMPTY_SLOT + 已绑定该托盘的库位。" },
            2: { need: "part",   hint: "前端只选零件号,后端自动找 FULL_MATERIAL + 该零件的库位。" },
            3: { need: "pallet", hint: "前端选要取的空托盘类型(必须 ∈ CP 绑定),后端自动找有该空托的库位。" },
            4: { need: "part",   hint: "前端选零件,后端按 零件→托盘 映射自动匹配托盘类型 & 找空库位。" },
        };

        function applyBusinessFields(bt) {
            const btKey = App.toIntKey(bt);
            const rule = BIZ_RULES[btKey] || { need: null, hint: "" };
            document.getElementById("dpHint").textContent = rule.hint;

            const partL    = document.getElementById("dpPartLabel");
            const palletL  = document.getElementById("dpPalletLabel");
            const partI    = document.getElementById("dpPart");
            const palletI  = document.getElementById("dpPallet");

            partL.style.display   = rule.need === "part"   ? "" : "none";
            palletL.style.display = rule.need === "pallet" ? "" : "none";
            partI.required        = rule.need === "part";
            palletI.required      = rule.need === "pallet";

            // 业务4 (SEND_MATERIAL_TO_WS):选零件后展示"自动匹配的托盘类型"
            const matchBox = document.getElementById("dpPartPalletMatch");
            if (btKey === 4 && rule.need === "part") {
                matchBox.style.display = "";
                refreshPartPalletMatch();
            } else {
                matchBox.style.display = "none";
            }
        }

        function refreshPartPalletMatch() {
            const partId = getSelectedPartId();
            const box = document.getElementById("dpPartPalletMatch");
            if (!partId || !cachedMappings || !cachedPallets) {
                box.textContent = "(选中零件后展示匹配的托盘类型)";
                return;
            }
            const cp = cachedCps.find(x => x.uuid === document.getElementById("dispatchForm").dataset.cpUuid);
            const cpBoundIds = new Set(cp && cp.pallet_type_ids ? cp.pallet_type_ids : []);
            const partPtIds = cachedMappings
                .filter(m => m.part_id === partId && m.is_active !== false)
                .map(m => m.pallet_type_id);
            if (partPtIds.length === 0) {
                box.innerHTML = `<span class="error">该零件未在 零件↔托盘 绑定表配置任何托盘类型</span>`;
                return;
            }
            const inter = partPtIds.filter(id => cpBoundIds.has(id));
            const nameOf = id => {
                const p = (cachedPallets || []).find(x => x.id === id);
                return p ? (p.name || p.code) : `#${id}`;
            };
            const allNames = partPtIds.map(nameOf).join("、");
            if (inter.length === 0) {
                box.innerHTML = `<span class="error">零件绑定托盘(${allNames})与本 CP 已绑定托盘无交集,无法下发</span>`;
                return;
            }
            const interNames = inter.map(nameOf).join("、");
            box.innerHTML = `匹配的托盘类型:<b>${App.escapeHtml(interNames)}</b>` +
                (inter.length < partPtIds.length ? `<span class="muted"> (零件全部候选:${App.escapeHtml(allNames)})</span>` : "");
        }

        function getSelectedPartId() {
            const uuid = document.getElementById("dpPart").value;
            if (!uuid || !cachedParts) return null;
            const p = cachedParts.find(x => x.uuid === uuid);
            return p ? p.id : null;
        }

        async function openDispatch(uuid, code) {
            const cp = cachedCps.find(x => x.uuid === uuid);
            if (!cp) return;
            document.getElementById("dispatchModalTitle").textContent = `呼叫调度 · ${code}`;
            document.getElementById("dispatchModalSub").textContent = `CP uuid: ${uuid}  |  支持 ${cp.business_types.length} 种业务  |  绑定空托盘 ${cp.pallet_type_ids ? cp.pallet_type_ids.length : 0} 种`;
            document.getElementById("dispatchError").textContent = "";
            document.getElementById("dispatchSubmit").disabled = false;
            document.getElementById("dispatchSubmit").textContent = "呼叫";
            document.getElementById("dispatchForm").dataset.cpUuid = uuid;

            // 业务下拉:只显示该 cp 支持的业务
            const btSel = document.getElementById("dpBusiness");
            btSel.innerHTML = "";
            cp.business_types.forEach(bt => {
                const info = App.BUSINESS_TYPE[App.toIntKey(bt)];
                const o = document.createElement("option");
                o.value = bt;
                o.textContent = info ? `${bt}. ${info.long}` : String(bt);
                btSel.appendChild(o);
            });
            if (cp.business_types.length === 0) {
                document.getElementById("dispatchError").textContent = "该呼叫点未配置任何支持的业务类型";
                document.getElementById("dispatchSubmit").disabled = true;
            }

            await ensureDispatchLookups();

            // 零件下拉 = 全部零件
            fillSelect(
                document.getElementById("dpPart"),
                cachedParts || [], "uuid",
                p => p.name || p.code,
                { value: "", label: "请选择零件..." },
            );

            // 托盘下拉 = 仅 CP 已绑定的空托盘类型 (展示 name 优先, 后端字段用 uuid)
            const allowedPalletIds = new Set(cp.pallet_type_ids || []);
            const cpPallets = (cachedPallets || []).filter(p => allowedPalletIds.has(p.id));
            fillSelect(
                document.getElementById("dpPallet"),
                cpPallets, "uuid",
                p => p.name || p.code,
                { value: "", label: cpPallets.length ? "请选择托盘类型..." : "(该 CP 未绑定任何空托盘类型)" },
            );

            // AGV 下拉 = 启用 AGV
            const activeAgvs = (cachedAgvs || []).filter(a => a.is_active);
            fillSelect(
                document.getElementById("dpAgv"),
                activeAgvs, "uuid",
                a => `${a.name} (${a.uuid})`,
                { value: "", label: "自动选择" },
            );

            applyBusinessFields(btSel.value);
            App.showModal("dispatchModal");
        }

        document.getElementById("dpBusiness").addEventListener("change", e => {
            applyBusinessFields(e.target.value);
        });

        document.getElementById("dpPart").addEventListener("change", () => {
            const bt = App.toIntKey(document.getElementById("dpBusiness").value);
            if (bt === 4) refreshPartPalletMatch();
        });

        document.getElementById("dispatchForm").addEventListener("submit", async e => {
            e.preventDefault();
            const errEl = document.getElementById("dispatchError");
            const submitBtn = document.getElementById("dispatchSubmit");
            errEl.textContent = "";

            const cpUuid = document.getElementById("dispatchForm").dataset.cpUuid;
            const bt = App.toIntKey(document.getElementById("dpBusiness").value);
            const rule = BIZ_RULES[bt] || { need: null };
            const payload = { business_type: bt };

            if (rule.need === "part") {
                payload.part_uuid = document.getElementById("dpPart").value || null;
                if (!payload.part_uuid) return errEl.textContent = "请选择零件";
            } else if (rule.need === "pallet") {
                payload.pallet_type_uuid = document.getElementById("dpPallet").value || null;
                if (!payload.pallet_type_uuid) return errEl.textContent = "请选择(空)托盘类型";
            }
            const agv = document.getElementById("dpAgv").value;
            if (agv) payload.prefer_agv_uuid = agv;

            submitBtn.disabled = true;
            submitBtn.textContent = "呼叫中...";
            try {
                const task = await api("POST", `/api/v1/call-points/${cpUuid}/dispatch`, payload);
                App.hideModal("dispatchModal");
                if (confirm(`呼叫成功!\n任务 #${task.id} 已下发给 AGV ${task.agv_name}\n${task.description || ""}\n\n是否打开任务历史查看详情?`)) {
                    location.href = "tasks.html";
                    return;
                }
                await loadCps();
            } catch (err) {
                errEl.textContent = err.message;
                submitBtn.disabled = false;
                submitBtn.textContent = "呼叫";
            }
        });

        document.getElementById("cpForm").addEventListener("submit", async e => {
            e.preventDefault();
            const errEl = document.getElementById("cpError");
            errEl.textContent = "";
            const bts = Array.from(document.querySelectorAll("#cpBtGroup input[name=bt]:checked"))
                .map(cb => parseInt(cb.value, 10));
            const ptIds = Array.from(document.getElementById("cpPalletTypes").selectedOptions)
                .map(o => parseInt(o.value, 10));
            const payload = {
                name: document.getElementById("cpName").value.trim() || null,
                func_mode: parseInt(document.getElementById("cpFunc").value, 10),
                bind_pallet_mode: parseInt(document.getElementById("cpBindMode").value, 10),
                coordinate_x: parseFloat(document.getElementById("cpX").value) || 0,
                coordinate_y: parseFloat(document.getElementById("cpY").value) || 0,
                priority: parseInt(document.getElementById("cpPriority").value, 10) || 0,
                max_concurrent_tasks: parseInt(document.getElementById("cpMax").value, 10) || 1,
                business_types: bts,
                pallet_type_ids: ptIds,
            };
            try {
                if (editingCpUuid) {
                    await api("PATCH", `/api/v1/call-points/${editingCpUuid}`, payload);
                } else {
                    payload.uuid = document.getElementById("cpUuid").value.trim();
                    payload.code = document.getElementById("cpCode").value.trim();
                    await api("POST", "/api/v1/call-points", payload);
                }
                App.hideModal("cpModal");
                await loadCps();
            } catch (err) { errEl.textContent = err.message; }
        });

        /* ===== AGV 点位子弹窗 (与 ws.html 同结构) ===== */
        async function openPoints(uuid, code) {
            currentCpUuid = uuid;
            document.getElementById("pointModalTitle").textContent = `AGV 点位 · 呼叫点 ${code}`;
            document.getElementById("pointModalSub").textContent = `CP uuid: ${uuid}`;
            document.getElementById("pointForm").reset();
            document.getElementById("pHeight").value = 0;
            document.getElementById("pLift").value = -1;
            document.getElementById("pointError").textContent = "";

            if (cachedAgvs.length === 0) {
                cachedAgvs = await api("GET", "/api/v1/agvs");
            }
            document.getElementById("pAgvId").innerHTML = cachedAgvs.map(a =>
                `<option value="${a.id}">${App.escapeHtml(a.name)} (${App.escapeHtml(a.uuid)})</option>`
            ).join("");

            await loadPoints();
            App.showModal("pointModal");
        }

        async function loadPoints() {
            const tbody = document.querySelector("#pointTable tbody");
            tbody.innerHTML = `<tr><td colspan="8" class="muted">加载中...</td></tr>`;
            try {
                const items = await api("GET", `/api/v1/call-points/${currentCpUuid}/agv-points`);
                const agvMap = new Map(cachedAgvs.map(a => [a.id, a.name]));
                if (items.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="8" class="muted">还没有点位</td></tr>`;
                    return;
                }
                tbody.innerHTML = items.map(p => `
                    <tr>
                        <td>${p.id}</td>
                        <td>${App.escapeHtml(agvMap.get(p.agv_id) || p.agv_id)}</td>
                        <td>${App.escapeHtml(p.ap)}</td>
                        <td class="muted">${App.escapeHtml(p.pre || "-")}</td>
                        <td class="muted">${App.escapeHtml(p.tp || "-")}</td>
                        <td>${p.height}</td>
                        <td>${p.lift_height}</td>
                        <td class="actions">
                            ${role === "admin" ? `<button data-pact="del" data-id="${p.id}" class="danger">删除</button>` : ""}
                        </td>
                    </tr>
                `).join("");
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="8" class="error">${e.message}</td></tr>`;
            }
        }

        document.querySelector("#pointTable").addEventListener("click", async e => {
            const btn = e.target.closest("button[data-pact='del']");
            if (!btn) return;
            const id = btn.dataset.id;
            if (!confirm(`确认删除点位 #${id}?`)) return;
            try { await api("DELETE", `/api/v1/call-points/${currentCpUuid}/agv-points/${id}`); await loadPoints(); }
            catch (err) { alert(err.message); }
        });

        document.getElementById("pointForm").addEventListener("submit", async e => {
            e.preventDefault();
            if (role !== "admin") return alert("只有 admin 能改");
            const errEl = document.getElementById("pointError");
            errEl.textContent = "";
            const payload = {
                agv_id: parseInt(document.getElementById("pAgvId").value, 10),
                ap: document.getElementById("pAp").value.trim(),
                pre: document.getElementById("pPre").value.trim() || null,
                height_pre: document.getElementById("pHeightPre").value.trim() || null,
                tp: document.getElementById("pTp").value.trim() || null,
                height: parseFloat(document.getElementById("pHeight").value) || 0,
                lift_height: parseFloat(document.getElementById("pLift").value) || -1,
            };
            try {
                await api("PUT", `/api/v1/call-points/${currentCpUuid}/agv-points`, payload);
                document.getElementById("pointForm").reset();
                document.getElementById("pHeight").value = 0;
                document.getElementById("pLift").value = -1;
                await loadPoints();
                await loadCps();
            } catch (err) { errEl.textContent = err.message; }
        });

        loadCps();
    </script>
</body>
</html>
