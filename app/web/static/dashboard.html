<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGV 调度系统-控制台</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 顶栏 (内容由 app.js 渲染) -->
    <header class="topbar">
        <h1>AGV 控制台</h1>
        <div></div>
    </header>

    <main>
        <!-- 工具栏 -->
        <div class="toolbar">
            <h2>AGV列表</h2>
            <button class="secondary" id="refreshBtn">刷新</button>
            <button class="secondary" id="pingAllBtn" title="对所有启用的 AGV 测一次通信">全部测连接</button>
            <label class="muted" style="margin: 0; display: flex; align-items: center; gap: 6px;">
                <input type="checkbox" id="autoRefresh" checked style="width:auto;display:inline;margin:0;">
                自动刷新 (5s)
            </label>
            <button id="addBtn">新增 AGV</button>
        </div>

        <!-- 表格 -->
        <table id="agvTable">
            <thead>
                <tr>
                    <th>UUID</th>
                    <th>名称</th>
                    <th>IP</th>
                    <th>类型</th>
                    <th>启用</th>
                    <th>运行态</th>
                    <th>电量</th>
                    <th>当前任务</th>
                    <th>连接</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <!-- 由 JS 动态填充 -->
            </tbody>
        </table>
        <p class="muted" style="margin-top: 8px;" id="emptyHint"></p>
    </main>

    <!-- 新增 / 编辑 AGV 弹窗 (共用同一表单,通过 data-mode 切换) -->
    <div class="modal-mask hidden" id="addModal">
        <form class="modal" id="addForm" data-mode="add">
            <h3 id="addTitle">新增 AGV</h3>
            <label>UUID(唯一标识) <span class="muted" id="uuidHint"></span>
                <input type="text" id="newUuid" required maxlength="64">
            </label>
            <label>显示名
                <input type="text" id="newName" required maxlength="64">
            </label>
            <label>IP 地址
                <input type="text" id="newIp" required placeholder="192.168.1.100">
            </label>
            <label>车型
                <select id="newMode">
                    <option value="1">叉车</option>
                    <option value="2" selected>顶升车</option>
                    <option value="3">拖车</option>
                    <option value="4">翻转车</option>
                </select>
            </label>
            <p class="muted">端口(默认值符合仙工 Robokit 标准)</p>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <label>状态端口 <input type="number" id="newPortState" value="19204"></label>
                <label>控制端口 <input type="number" id="newPortCtrl"  value="19205"></label>
                <label>任务端口 <input type="number" id="newPortTask"  value="19206"></label>
                <label>配置端口 <input type="number" id="newPortConfig" value="19207"></label>
                <label>杂项端口 <input type="number" id="newPortOther" value="19210"></label>
            </div>
            <div id="addError" class="error"></div>
            <div class="modal-actions">
                <button type="button" class="ghost" data-close="addModal">取消</button>
                <button type="submit">保存</button>
            </div>
        </form>
    </div>

    <!-- 实时状态弹窗 -->
    <div class="modal-mask hidden" id="statusModal">
        <div class="modal">
            <h3 id="statusTitle">AGV 实时状态</h3>
            <pre id="statusBody">加载中...</pre>
            <div class="modal-actions">
                <button class="secondary" id="statusRefreshBtn">再查一次</button>
                <button type="button" class="ghost" data-close="statusModal">关闭</button>
            </div>
        </div>
    </div>

    <!-- 下发任务弹窗 -->
    <div class="modal-mask hidden" id="taskModal">
        <form class="modal" id="taskForm">
            <h3 id="taskTitle">下发任务</h3>
            <!-- <p class="muted">
                字段对应仙工 3051 GOTARGET_REQ。
                <strong>operation</strong> 需在 Roboshop Pro 给该站点配置好执行对象后才能用,
                否则 AGV 会拒绝。
            </p> -->

            <label>目标站点 <span class="muted">(必填,等于仙工 body.id, 如 AP1 / LM6)</span>
                <input type="text" id="taskTargetPoint" required maxlength="64" placeholder="AP1">
            </label>

            <label>任务分类 <span class="muted">(仅做归档,不影响下发参数)</span>
                <select id="taskType">
                    <option value="1" selected>纯导航 (NAVIGATE)</option>
                    <option value="2">顶升取货 (JACK_LOAD)</option>
                    <option value="3">顶升放货 (JACK_UNLOAD)</option>
                    <!-- <option value="4">叉车取货 (FORK_LOAD)</option>
                    <option value="5">叉车放货 (FORK_UNLOAD)</option>
                    <option value="6">辊筒取货 (ROLLER_LOAD)</option>
                    <option value="7">辊筒放货 (ROLLER_UNLOAD)</option>
                    <option value="99">自定义 (CUSTOM)</option> -->
                </select>
            </label>

            <label>动作 operation <span class="muted">(NAVIGATE 留空)</span>
                <select id="taskOperation">
                    <option value="">OnlyNavi</option>
                    <option value="JackLoad">JackLoad</option>
                    <option value="JackUnload">JackUnload</option>
                    <option value="JackHeight">JackHeight</option>
                    <!-- <option value="ForkLoad">ForkLoad</option>
                    <option value="ForkUnload">ForkUnload</option>
                    <option value="RollerLoad">RollerLoad</option>
                    <option value="RollerUnload">RollerUnload</option>
                    <option value="HookLoad">HookLoad</option>
                    <option value="HookUnload">HookUnload</option> -->
                </select>
            </label>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                <label>起点 source_id <span class="muted">(可选)</span>
                    <input type="text" id="taskSourceId" maxlength="64" placeholder="LM1">
                </label>
                <label>朝向 angle (rad, 可选)
                    <input type="number" step="any" id="taskAngle" placeholder="例如 1.57">
                </label>
            </div>

            <label>其它参数 extra_args (JSON, 可选)
                <input type="text" id="taskExtraArgs" placeholder='{"script_args":["xxx"]}'>
            </label>

            <div id="taskError" class="error"></div>
            <div class="modal-actions">
                <button type="button" class="ghost" data-close="taskModal">取消</button>
                <button type="submit">下发</button>
            </div>
        </form>
    </div>

    <script src="app.js"></script>
    <script>
        App.renderTopbar("AGV 控制台", "dashboard.html");
        App.bindModalCloseButtons();
        const api = App.api;
        const user = App.user;
        const showModal = App.showModal;
        const hideModal = App.hideModal;

        //     AGV 列表加载                                            
        const MODE_NAMES = { 1: "叉车", 2: "顶升车", 3: "拖车", 4: "翻转车" };
        let cachedAgvs = [];
        // ping 结果按 uuid 缓存,自动刷新重渲后不丢
        const connState = new Map();

        async function loadAgvs() {
            const tbody = document.querySelector("#agvTable tbody");
            tbody.innerHTML = `<tr><td colspan="10" class="muted">加载中...</td></tr>`;
            try {
                cachedAgvs = await api("GET", "/api/v1/agvs");
                renderTable();
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="10" class="error">${e.message}</td></tr>`;
            }
        }

        // OFFLINE / UNKNOWN 时不展示电量(后端心跳已把 battery_level 清空,这里再做一层兜底)
        const _OFFLINE_RS = [0, 6];
        function batteryCell(level, run_state) {
            if (level === null || level === undefined || _OFFLINE_RS.includes(parseInt(run_state, 10))) {
                return `<span class="muted">-</span>`;
            }
            const v = Math.round(level);
            const color = v < 20 ? "#ed4858" : v < 50 ? "#f4c44b" : "#66c2a5";
            return `<span class="badge" style="background:${color};color:#fff;min-width:46px;text-align:center;">${v}%</span>`;
        }

        function renderTable() {
            const tbody = document.querySelector("#agvTable tbody");
            const hint = document.getElementById("emptyHint");
            if (cachedAgvs.length === 0) {
                tbody.innerHTML = "";
                hint.textContent = '还没有 AGV,点右上"新增 AGV"开始。';
                return;
            }
            hint.textContent = "";
            tbody.innerHTML = cachedAgvs.map((a, idx) => {
                const rs = App.agvRunState(a.run_state);
                const lastTs = a.last_status_at ? App.fmtTime(a.last_status_at) : "未拉取";
                return `
                <tr data-uuid="${a.uuid}">
                    <td><code>${a.uuid}</code></td>
                    <td>${a.name}</td>
                    <td>${a.ip}</td>
                    <td>${MODE_NAMES[a.mode] || a.mode}</td>
                    <td>
                        <span class="badge ${a.is_active ? "on" : "off"}">
                            ${a.is_active ? "启用" : "禁用"}
                        </span>
                    </td>
                    <td>
                        <span class="badge" style="background:${rs.color};color:#fff;" title="last_status_at: ${lastTs}">${rs.name}</span>
                    </td>
                    <td>${batteryCell(a.battery_level, a.run_state)}</td>
                    <td>${a.current_task_uuid ? `<code class="muted" title="${a.current_task_uuid}">${a.current_task_uuid.substring(0,8)}...</code>` : '<span class="muted">-</span>'}</td>
                    <td>${(() => {
                        const s = connState.get(a.uuid);
                        if (!s) return `<span class="badge unknown" data-conn-cell="${idx}">未测</span>`;
                        return `<span class="badge ${s.cls}" data-conn-cell="${idx}" title="${s.title || ''}">${s.text}</span>`;
                    })()}</td>
                    <td class="actions">
                        <button data-act="ping"     data-uuid="${a.uuid}" ${a.is_active ? "" : "disabled"}>测通信</button>
                        <button data-act="status"   data-uuid="${a.uuid}" class="secondary" ${a.is_active ? "" : "disabled"}>实时状态</button>
                        <button data-act="dispatch" data-uuid="${a.uuid}" data-name="${a.name}" ${a.is_active ? "" : "disabled"}>下发任务</button>
                        ${user.role === "admin" ? `
                            <button data-act="edit"   data-uuid="${a.uuid}" class="secondary">编辑</button>
                            <button data-act="toggle" data-uuid="${a.uuid}" data-active="${a.is_active}" class="${a.is_active ? 'secondary' : ''}">${a.is_active ? "停用" : "启用"}</button>
                            <button data-act="delete" data-uuid="${a.uuid}" class="danger">删除</button>
                        ` : ""}
                    </td>
                </tr>
            `;}).join("");
        }

        //     行内动作                                             
        document.querySelector("#agvTable").addEventListener("click", async (e) => {
            const btn = e.target.closest("button[data-act]");
            if (!btn) return;
            const uuid = btn.dataset.uuid;
            const act = btn.dataset.act;

            if (act === "ping") {
                await pingOne(uuid, btn);
            } else if (act === "status") {
                await showStatus(uuid);
            } else if (act === "dispatch") {
                openTaskModal(uuid, btn.dataset.name);
            } else if (act === "edit") {
                openEditModal(uuid);
            } else if (act === "toggle") {
                const isActive = btn.dataset.active === "true";
                const next = !isActive;
                if (!confirm(`确认${next ? "启用" : "停用"} AGV ${uuid}?${next ? "" : "\n停用后心跳轮询会跳过该车,且不能下发任务。"}`)) return;
                try {
                    await api("POST", `/api/v1/agvs/${uuid}/toggle-active?active=${next}`);
                    connState.delete(uuid);
                    await loadAgvs();
                } catch (e) { alert(e.message); }
            } else if (act === "delete") {
                if (!confirm(`确认删除 AGV ${uuid}?`)) return;
                try {
                    await api("DELETE", `/api/v1/agvs/${uuid}`);
                    await loadAgvs();
                } catch (e) { alert(e.message); }
            }
        });

        async function pingOne(uuid, btnEl) {
            const row = document.querySelector(`tr[data-uuid="${uuid}"]`);
            const connCell = row ? row.querySelector("[data-conn-cell]") : null;
            if (btnEl) { btnEl.disabled = true; btnEl.textContent = "测试中..."; }
            if (connCell) {
                connCell.className = "badge unknown";
                connCell.textContent = "测试中";
            }
            try {
                const res = await api("POST", `/api/v1/agvs/${uuid}/ping`);
                if (res.ok) {
                    connState.set(uuid, { cls: "on",  text: `在线 ${res.latency_ms}ms`, title: "" });
                } else {
                    connState.set(uuid, { cls: "off", text: res.reason || "失败",      title: res.error || "" });
                }
            } catch (e) {
                connState.set(uuid, { cls: "off", text: "错误", title: e.message });
            } finally {
                if (btnEl) { btnEl.disabled = false; btnEl.textContent = "测通信"; }
                // 把最新结果回写到当前行(避免等待下次自动刷新)
                const s = connState.get(uuid);
                const r2 = document.querySelector(`tr[data-uuid="${uuid}"]`);
                const c2 = r2 ? r2.querySelector("[data-conn-cell]") : null;
                if (c2 && s) { c2.className = "badge " + s.cls; c2.textContent = s.text; c2.title = s.title || ""; }
            }
        }

        document.getElementById("pingAllBtn").addEventListener("click", async () => {
            const tasks = cachedAgvs
                .filter(a => a.is_active)
                .map(a => pingOne(a.uuid, null));
            await Promise.all(tasks);
        });

        async function showStatus(uuid) {
            document.getElementById("statusTitle").textContent = `AGV 实时状态 · ${uuid}`;
            const body = document.getElementById("statusBody");
            body.textContent = "加载中...";
            showModal("statusModal");
            document.getElementById("statusRefreshBtn").onclick = () => showStatus(uuid);
            try {
                const data = await api("GET", `/api/v1/agvs/${uuid}/status`);
                body.textContent = JSON.stringify(data, null, 2);
            } catch (e) {
                body.textContent = "查询失败: " + e.message;
            }
        }

        // 新增 / 编辑 AGV — 共用 #addModal 表单,用 data-mode 切换
        const addForm  = document.getElementById("addForm");
        const addTitle = document.getElementById("addTitle");
        const uuidHint = document.getElementById("uuidHint");
        const newUuid  = document.getElementById("newUuid");

        function setFormMode(mode, agv) {
            addForm.dataset.mode = mode;
            document.getElementById("addError").textContent = "";
            addForm.reset();
            if (mode === "add") {
                addTitle.textContent = "新增 AGV";
                uuidHint.textContent = "";
                newUuid.value = "";
                newUuid.readOnly = false;
                newUuid.style.background = "";
            } else {
                addTitle.textContent = `编辑 AGV · ${agv.name}`;
                uuidHint.textContent = "(只读,不可修改)";
                newUuid.value = agv.uuid;
                newUuid.readOnly = true;
                newUuid.style.background = "#f3f4f6";
                document.getElementById("newName").value      = agv.name;
                document.getElementById("newIp").value        = agv.ip;
                document.getElementById("newMode").value      = String(agv.mode);
                document.getElementById("newPortState").value  = agv.port_state;
                document.getElementById("newPortCtrl").value   = agv.port_ctrl;
                document.getElementById("newPortTask").value   = agv.port_task;
                document.getElementById("newPortConfig").value = agv.port_config;
                document.getElementById("newPortOther").value  = agv.port_other;
            }
            showModal("addModal");
        }

        function openEditModal(uuid) {
            const agv = cachedAgvs.find(a => a.uuid === uuid);
            if (!agv) { alert("AGV 数据未加载,稍后再试"); return; }
            setFormMode("edit", agv);
        }

        document.getElementById("addBtn").addEventListener("click", () => {
            if (user.role !== "admin") {
                alert("只有 admin 角色能新增 AGV");
                return;
            }
            setFormMode("add");
        });

        addForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const errEl = document.getElementById("addError");
            errEl.textContent = "";
            const mode = addForm.dataset.mode;
            const payload = {
                name: document.getElementById("newName").value.trim(),
                ip:   document.getElementById("newIp").value.trim(),
                mode: parseInt(document.getElementById("newMode").value, 10),
                port_state:  parseInt(document.getElementById("newPortState").value, 10),
                port_ctrl:   parseInt(document.getElementById("newPortCtrl").value, 10),
                port_task:   parseInt(document.getElementById("newPortTask").value, 10),
                port_config: parseInt(document.getElementById("newPortConfig").value, 10),
                port_other:  parseInt(document.getElementById("newPortOther").value, 10),
            };
            try {
                if (mode === "edit") {
                    const uuid = newUuid.value.trim();
                    await api("PATCH", `/api/v1/agvs/${uuid}`, payload);
                } else {
                    payload.uuid = newUuid.value.trim();
                    await api("POST", "/api/v1/agvs", payload);
                }
                hideModal("addModal");
                await loadAgvs();
            } catch (err) {
                errEl.textContent = err.message;
            }
        });

        //     下发任务
        let currentTaskAgvUuid = null;

        function openTaskModal(agvUuid, agvName) {
            currentTaskAgvUuid = agvUuid;
            document.getElementById("taskTitle").textContent = `下发任务 · ${agvName} (${agvUuid})`;
            document.getElementById("taskForm").reset();
            document.getElementById("taskError").textContent = "";
            showModal("taskModal");
        }

        document.getElementById("taskForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const errEl = document.getElementById("taskError");
            errEl.textContent = "";

            //  extra_args 是 JSON 字符串,空就传 {}
            let extraArgs = {};
            const raw = document.getElementById("taskExtraArgs").value.trim();
            if (raw) {
                try {
                    extraArgs = JSON.parse(raw);
                    if (typeof extraArgs !== "object" || Array.isArray(extraArgs)) {
                        throw new Error("extra_args 必须是 JSON 对象");
                    }
                } catch (err) {
                    errEl.textContent = "extra_args 不是合法 JSON: " + err.message;
                    return;
                }
            }

            const angleStr = document.getElementById("taskAngle").value.trim();
            const payload = {
                agv_uuid: currentTaskAgvUuid,
                type: parseInt(document.getElementById("taskType").value, 10),
                target_point: document.getElementById("taskTargetPoint").value.trim(),
                source_id: document.getElementById("taskSourceId").value.trim() || null,
                operation: document.getElementById("taskOperation").value || null,
                angle: angleStr ? parseFloat(angleStr) : null,
                extra_args: extraArgs,
            };

            const submitBtn = e.submitter || document.querySelector("#taskForm button[type=submit]");
            submitBtn.disabled = true;
            submitBtn.textContent = "下发中...";
            try {
                const task = await api("POST", "/api/v1/tasks", payload);
                hideModal("taskModal");
                if (confirm(`任务已下发: #${task.id} ${task.target_point} (状态 ${statusName(task.status)})\n打开任务历史?`)) {
                    window.location.href = "tasks.html";
                }
            } catch (err) {
                errEl.textContent = err.message;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "下发";
            }
        });

        const TASK_STATUS_NAME = {
            0: "INIT", 1: "RUNNING", 2: "PAUSED",
            3: "COMPLETED", 4: "FAILED", 5: "CANCELED"
        };
        function statusName(code) { return TASK_STATUS_NAME[code] || code; }

        // 刷新按钮 + 自动刷新 + 首次加载
        document.getElementById("refreshBtn").addEventListener("click", loadAgvs);
        App.makeAutoRefresh(loadAgvs, 5000, "autoRefresh")();
        loadAgvs();
    </script>
</body>
</html>
