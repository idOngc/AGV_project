<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGV 调度系统-任务历史</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="topbar">
        <h1>任务历史</h1>
        <div></div>
    </header>

    <main>
        <div class="toolbar">
            <h2>任务列表</h2>

            <label class="muted" style="margin: 0; display: flex; align-items: center; gap: 6px;">
                AGV
                <select id="filterAgv">
                    <option value="">全部</option>
                </select>
            </label>

            <label class="muted" style="margin: 0; display: flex; align-items: center; gap: 6px;">
                状态
                <select id="filterStatus">
                    <option value="">全部</option>
                    <option value="0">INIT 待下发</option>
                    <option value="1">RUNNING 执行中</option>
                    <option value="2">PAUSED 已暂停</option>
                    <option value="3">COMPLETED 已完成</option>
                    <option value="4">FAILED 失败</option>
                    <option value="5">CANCELED 已取消</option>
                </select>
            </label>

            <button class="secondary" id="refreshBtn">刷新</button>

            <label class="muted" style="margin: 0; display: flex; align-items: center; gap: 6px;">
                <input type="checkbox" id="autoRefresh" checked style="width:auto;display:inline;margin:0;">
                自动刷新 (3s)
            </label>
        </div>

        <table id="taskTable">
            <thead>
                <tr>
                    <th>#ID</th>
                    <th>AGV</th>
                    <th>业务 / 模板</th>
                    <th>进度</th>
                    <th>目标</th>
                    <th>状态</th>
                    <th>创建</th>
                    <th>完成</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        <p class="muted" style="margin-top: 8px;" id="emptyHint"></p>
    </main>

    <!-- ===== 任务详情弹窗 (P4-D 主舞台) ===== -->
    <div class="modal-mask hidden" id="detailModal">
        <div class="modal wide">
            <h3 id="detailTitle">任务详情</h3>
            <div id="detailBody">加载中...</div>
            <div class="modal-actions">
                <button type="button" class="secondary" id="detailRefreshBtn">刷新</button>
                <button type="button" class="danger" id="completeEarlyBtn" style="display:none;">提前完成</button>
                <button type="button" class="ghost" data-close="detailModal" id="detailCloseBtn">关闭</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        App.renderTopbar("任务历史", "tasks.html");
        App.bindModalCloseButtons();
        const api = App.api;
        const fmtTime = App.fmtTime;
        const esc = App.escapeHtml;

        let currentDetailTaskId = null;
        let detailRefreshTimer = null;

        async function loadAgvOptions() {
            try {
                const agvs = await api("GET", "/api/v1/agvs");
                const sel = document.getElementById("filterAgv");
                agvs.forEach(a => {
                    const opt = document.createElement("option");
                    opt.value = a.uuid;
                    opt.textContent = `${a.name} (${a.uuid})`;
                    sel.appendChild(opt);
                });
            } catch (e) {
                console.warn("加载 AGV 列表失败:", e);
            }
        }

        function renderBusinessCell(t) {
            if (t.business_type) {
                const short = App.btLabel(t.business_type, "short");
                const long  = App.btLabel(t.business_type, "long");
                const tpl   = t.template_code ? `<div class="muted" style="font-size:11px;">${esc(t.template_code)}</div>` : "";
                return `<span class="badge on" title="${esc(long)}" style="background:#e6f0ff;color:#2a4a8a;">${esc(short)}</span>${tpl}`;
            }
            // 手动 ad-hoc 任务
            return `<span class="muted">手动 · ${esc(App.TASK_TYPE_NAME[t.type] || t.type)}</span>`;
        }

        function renderProgressCell(t) {
            if (t.business_type) {
                // 调度任务总共 6 步;不同 current_step_no 对应进度
                return `<span class="muted">step ${t.current_step_no}/5</span>`;
            }
            return `<span class="muted">-</span>`;
        }

        function renderTargetCell(t) {
            if (t.business_type) {
                const from = t.from_ws_name ? `<div class="muted">from ${esc(t.from_ws_name)}</div>` : "";
                const to   = t.to_ws_name   ? `<div class="muted">to ${esc(t.to_ws_name)}</div>`   : "";
                const cp   = t.call_point_name ? `<div class="muted">CP ${esc(t.call_point_name)}</div>` : "";
                return cp + from + to;
            }
            return `<code>${esc(t.target_point)}</code>${t.operation ? `<div class="muted">${esc(t.operation)}</div>` : ""}`;
        }

        async function loadTasks() {
            const tbody = document.querySelector("#taskTable tbody");
            const hint = document.getElementById("emptyHint");
            const params = new URLSearchParams();
            const agv = document.getElementById("filterAgv").value;
            const status = document.getElementById("filterStatus").value;
            if (agv) params.set("agv_uuid", agv);
            if (status !== "") params.set("status", status);
            params.set("limit", "100");

            try {
                const tasks = await api("GET", "/api/v1/tasks?" + params.toString());
                if (tasks.length === 0) {
                    tbody.innerHTML = "";
                    hint.textContent = "没有匹配的任务。可以在 AGV 控制台点「下发任务」或在呼叫点页点「呼叫」。";
                    return;
                }
                hint.textContent = "";
                tbody.innerHTML = tasks.map(t => {
                    const ts = App.taskStatus(t.status);
                    const canPause   = t.status === 1;
                    const canResume  = t.status === 2;
                    const canCancel  = t.status === 1 || t.status === 2;
                    const canEarlyDone = (t.status === 1 || t.status === 2) && !!t.business_type;
                    const err = t.error_msg
                        ? `<div class="muted" title="${esc(t.error_msg)}">${esc(t.error_msg.substring(0,40))}${t.error_msg.length>40?'…':''}</div>`
                        : "";
                    return `
                    <tr data-id="${t.id}">
                        <td><a href="#" data-act="detail" data-id="${t.id}">#${t.id}</a></td>
                        <td>${esc(t.agv_name)} <span class="muted">(${esc(t.agv_uuid)})</span></td>
                        <td>${renderBusinessCell(t)}</td>
                        <td>${renderProgressCell(t)}</td>
                        <td>${renderTargetCell(t)}</td>
                        <td>
                            <span class="badge ${ts.cls}">${ts.cn}</span>
                            ${err}
                        </td>
                        <td class="muted">${fmtTime(t.created_at)}</td>
                        <td class="muted">${fmtTime(t.finished_at)}</td>
                        <td class="actions">
                            <button data-act="detail"  data-id="${t.id}" class="secondary">详情</button>
                            <button data-act="pause"   data-id="${t.id}" class="secondary" ${canPause?"":"disabled"}>暂停</button>
                            <button data-act="resume"  data-id="${t.id}" class="secondary" ${canResume?"":"disabled"}>继续</button>
                            <button data-act="cancel"  data-id="${t.id}" class="danger"    ${canCancel?"":"disabled"}>取消</button>
                            ${canEarlyDone ? `<button data-act="early" data-id="${t.id}" class="danger">提前完成</button>` : ""}
                        </td>
                    </tr>
                    `;
                }).join("");
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="9" class="error">${e.message}</td></tr>`;
            }
        }

        //  行内动作 
        document.querySelector("#taskTable").addEventListener("click", async (e) => {
            const a   = e.target.closest("a[data-act]");
            const btn = e.target.closest("button[data-act]");
            const node = a || btn;
            if (!node) return;
            if (a) e.preventDefault();

            const id  = node.dataset.id;
            const act = node.dataset.act;
            if (act === "detail") { await openDetail(id); return; }

            const labels = { pause: "暂停", resume: "继续", cancel: "取消", early: "提前完成" };
            if ((act === "cancel" || act === "early") &&
                !confirm(`确认${labels[act]}任务 #${id}? AGV 会停在当前位置。`)) return;
            btn.disabled = true;
            const orig = btn.textContent;
            btn.textContent = labels[act] + "中...";
            try {
                const url = act === "early"
                    ? `/api/v1/tasks/${id}/complete-early`
                    : `/api/v1/tasks/${id}/${act}`;
                await api("POST", url);
                await loadTasks();
            } catch (err) {
                alert(`${labels[act]} 失败: ${err.message}`);
                btn.disabled = false;
                btn.textContent = orig;
            }
        });

        /* ============ 详情弹窗 ============ */

        function fmtMs(ms) {
            if (!ms) return "-";
            if (ms < 1000) return `${ms}ms`;
            return `${(ms / 1000).toFixed(1)}s`;
        }

        function renderTaskDetail(d) {
            const ts = App.taskStatus(d.status);
            const bt = d.business_type ? App.btLabel(d.business_type, "long") : "(手动任务)";
            // 详情卡片
            const meta = `
                <dl class="task-meta">
                    <dt>任务 UUID</dt>      <dd><code>${esc(d.uuid)}</code></dd>
                    <dt>AGV</dt>            <dd>${esc(d.agv_name)} (${esc(d.agv_uuid)})</dd>
                    <dt>业务类型</dt>       <dd>${esc(bt)}${d.template_code ? ` <span class="muted">[${esc(d.template_code)}]</span>` : ""}</dd>
                    <dt>状态</dt>           <dd><span class="badge ${ts.cls}">${ts.cn}</span></dd>
                    <dt>呼叫点</dt>         <dd>${d.call_point_name ? esc(d.call_point_name) : '<span class="muted">-</span>'}</dd>
                    <dt>当前 step</dt>      <dd>${d.current_step_no}/5</dd>
                    <dt>起点库位</dt>       <dd>${d.from_ws_name ? esc(d.from_ws_name) : '<span class="muted">-</span>'}</dd>
                    <dt>终点库位</dt>       <dd>${d.to_ws_name   ? esc(d.to_ws_name)   : '<span class="muted">-</span>'}</dd>
                    <dt>零件</dt>           <dd>${d.part_name ? esc(d.part_name) : '<span class="muted">-</span>'}</dd>
                    <dt>托盘类型</dt>       <dd>${d.pallet_type_name ? esc(d.pallet_type_name) : '<span class="muted">-</span>'}</dd>
                    <dt>创建</dt>           <dd class="muted">${fmtTime(d.created_at)}</dd>
                    <dt>开始</dt>           <dd class="muted">${fmtTime(d.started_at)}</dd>
                    <dt>完成</dt>           <dd class="muted">${fmtTime(d.finished_at)}</dd>
                    <dt>总耗时</dt>         <dd>${d.duration_sec ? d.duration_sec + "s" : "-"}</dd>
                    <dt>描述</dt>           <dd>${d.description ? esc(d.description) : '<span class="muted">-</span>'}</dd>
                    <dt>错误</dt>           <dd>${d.error_msg ? `<span class="error">${esc(d.error_msg)}</span>` : '<span class="muted">-</span>'}</dd>
                </dl>`;

            // step 表格
            const steps = (d.steps || []).map(s => {
                const ss = App.stepStatus(s.status);
                return `
                <tr class="step-${ss.cls.replace('step-status-','')}">
                    <td>${s.step_no}</td>
                    <td><code>${esc(s.module)}</code></td>
                    <td>${esc(s.operation || "-")}</td>
                    <td>${esc(s.point_role || "-")}</td>
                    <td>${s.point_value ? `<code>${esc(s.point_value)}</code>` : '<span class="muted">本地</span>'}</td>
                    <td><span class="badge ${ss.cls}">${ss.name}</span></td>
                    <td class="muted">${fmtMs(s.duration_ms)}</td>
                    <td class="muted">${fmtTime(s.started_at)}</td>
                    <td class="muted">${fmtTime(s.finished_at)}</td>
                    <td>${s.error_msg ? `<span class="error" title="${esc(s.error_msg)}">${esc(s.error_msg.substring(0,30))}${s.error_msg.length>30?'…':''}</span>` : ""}</td>
                </tr>`;
            }).join("");

            const stepsTable = `
                <h4 style="font-size:13px;color:#2a4a8a;margin:4px 0 6px;">步骤明细 (${d.steps ? d.steps.length : 0})</h4>
                <table class="steps">
                    <thead>
                        <tr>
                            <th>#</th><th>module</th><th>op</th><th>角色</th><th>站点</th>
                            <th>状态</th><th>耗时</th><th>开始</th><th>完成</th><th>错误</th>
                        </tr>
                    </thead>
                    <tbody>${steps || `<tr><td colspan="10" class="muted">无 step</td></tr>`}</tbody>
                </table>`;

            return meta + stepsTable;
        }

        async function fetchAndRender(id) {
            const body = document.getElementById("detailBody");
            try {
                const d = await api("GET", `/api/v1/tasks/${id}/detail`);
                body.innerHTML = renderTaskDetail(d);
                const btn = document.getElementById("completeEarlyBtn");
                const canEarly = (d.status === 1 || d.status === 2) && !!d.business_type;
                btn.style.display = canEarly ? "" : "none";
                btn.dataset.id = id;
            } catch (e) {
                body.innerHTML = `<div class="error">加载失败: ${esc(e.message)}</div>`;
            }
        }

        async function openDetail(id) {
            currentDetailTaskId = id;
            document.getElementById("detailTitle").textContent = `任务详情 · #${id}`;
            document.getElementById("detailBody").textContent = "加载中...";
            document.getElementById("completeEarlyBtn").style.display = "none";
            App.showModal("detailModal");
            await fetchAndRender(id);
            // 详情打开期间 2s 轮询
            if (detailRefreshTimer) clearInterval(detailRefreshTimer);
            detailRefreshTimer = setInterval(() => {
                if (currentDetailTaskId) fetchAndRender(currentDetailTaskId);
            }, 2000);
        }

        function stopDetailRefresh() {
            if (detailRefreshTimer) { clearInterval(detailRefreshTimer); detailRefreshTimer = null; }
            currentDetailTaskId = null;
        }

        document.getElementById("detailRefreshBtn").addEventListener("click", () => {
            if (currentDetailTaskId) fetchAndRender(currentDetailTaskId);
        });
        document.getElementById("detailCloseBtn").addEventListener("click", stopDetailRefresh);

        document.getElementById("completeEarlyBtn").addEventListener("click", async () => {
            const id = document.getElementById("completeEarlyBtn").dataset.id;
            if (!id) return;
            if (!confirm(`确认提前完成任务 #${id}?\n会调仙工 cancel + 剩余 step 标 SKIPPED + 解锁库存。`)) return;
            try {
                await api("POST", `/api/v1/tasks/${id}/complete-early`);
                await fetchAndRender(id);
                await loadTasks();
            } catch (err) {
                alert("提前完成失败: " + err.message);
            }
        });

        //  过滤器 & 自动刷新 
        document.getElementById("refreshBtn").addEventListener("click", loadTasks);
        document.getElementById("filterAgv").addEventListener("change", loadTasks);
        document.getElementById("filterStatus").addEventListener("change", loadTasks);
        App.makeAutoRefresh(loadTasks, 3000, "autoRefresh")();

        //  首屏 
        loadAgvOptions().then(loadTasks);
    </script>
</body>
</html>
